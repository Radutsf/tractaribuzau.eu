/* ===== MENIU SUS ===== */
.top-menu{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:1000;
}

.menu-inner{
  max-width:1100px;
  margin:15px auto 0;
  padding:14px 26px;
  background:rgba(255,255,255,0.18);
  backdrop-filter:blur(22px);
  border-radius:22px;
  border:1px solid rgba(255,255,255,0.35);
  display:flex;
  align-items:center;
  justify-content:space-between;

}

.menu-logo{
  font-weight:800;
}

.menu-links{
  display:flex;
  gap:26px;
}

.menu-links a{
  color:#fff;
  text-decoration:none;
  font-weight:600;
  position:relative;
}

.menu-links a::after{
  content:"";
  position:absolute;
  left:0;
  bottom:-4px;
  width:0;
  height:2px;
  background:#a113e8;
  transition:width .3s;
}

.menu-links a:hover::after,
.menu-links a.active::after{
  width:100%;
}

.menu-toggle{
  display:none;
  font-size:1.8em;
  cursor:pointer;
}

/* MOBILE MENU */
@media(max-width:768px){
  .menu-links{
    position:absolute;
    top:70px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(26,31,54,.96);
    width:90%;
    border-radius:18px;
    flex-direction:column;
    align-items:center;
    padding:25px 0;
    gap:20px;
    display:none;
  }
  .menu-links.active{display:flex;}
  .menu-toggle{display:block;}
}

/* HERO */
.gallery-hero{
  padding:110px 5% 40px;
  text-align:center;
  position:relative;
  z-index:2;
}
.gallery-hero h1{
  color:#a113e8;
  font-size:clamp(2.2em,5vw,3em);
}
.gallery-hero p{
  max-width:700px;
  margin:20px auto 0;
  opacity:.95;
}

/* GALLERY GRID */
.gallery{
  padding:50px 5%;
  max-width:1200px;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:30px;
  position:relative;
  z-index:2;
}

/* PHOTO CARD */
.photo-card{
  position:relative;
  aspect-ratio:4/3;
  border-radius:20px;
  overflow:hidden;
  box-shadow:
    0 15px 35px rgba(0,0,0,.45),
    0 0 25px rgba(161,19,232,.35);
  transition:transform .45s ease, box-shadow .45s ease;
}
.photo-card::after{
  content:"";
  position:absolute;
  inset:0;
  border-radius:20px;
  box-shadow:inset 0 0 25px rgba(255,255,255,.12);
  pointer-events:none;
}
.photo-card img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:transform .45s ease;
}
.photo-card:hover{
  transform:translateY(-10px) scale(1.03);
  box-shadow:
    0 25px 55px rgba(0,0,0,.6),
    0 0 45px rgba(161,19,232,.6);
}
.photo-card:hover img{
  transform:scale(1.12);
}

/* CTA */
.about-cta{
  text-align:center;
  margin:20px auto 0;
}
.about-cta a{
  display:inline-block;
  background:#fff;
  color:#a113e8;

  font-size:1.4em;
  font-weight:bold;
  text-decoration:none;
  box-shadow:0 0 35px #a113e8;
  transition:transform .3s, box-shadow .3s;
}
.about-cta a:hover{
  transform:scale(1.06);
  box-shadow:0 0 55px #a113e8;
}

/* FOOTER */
